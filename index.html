<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chào Ngân buổi sáng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="music" src="nhac.mp3" loop></audio>

<section id="welcomeScreen" class="welcome-screen">
    <div class="morning-bg">
        <span class="bubble b1"></span>
        <span class="bubble b2"></span>
        <span class="bubble b3"></span>
        <span class="bubble b4"></span>
        <span class="bubble b5"></span>
    </div>

    <div class="hello-card">
        <div class="sun-icon">☀️</div>
        <h1>Chào Ngân buổi sáng</h1>
        <p>Có một lá thư nhỏ muốn gửi đến Ngân hôm nay.</p>

        <div id="envelopeBox" class="envelope-box">
            <div class="mail-shadow"></div>

            <div class="envelope">
                <div class="letter-paper">
                    <div class="paper-line line1"></div>
                    <div class="paper-line line2"></div>
                    <div class="paper-line line3"></div>
                    <div class="paper-heart">♡</div>
                </div>

                <div class="env-back"></div>
                <div class="env-left"></div>
                <div class="env-right"></div>
                <div class="env-bottom"></div>
                <div class="env-flap"></div>

                <div class="wax-seal">✦</div>
                <div class="stamp">
                    <span>AM</span>
                </div>
            </div>

            <div class="tap-text">Bấm vào lá thư</div>
        </div>
    </div>
</section>

<section id="mainScreen" class="main-screen hidden">
    <div class="stage">
        <div class="photo-box">
            <img src="girl.png" class="photo" alt="girl">

            <canvas id="skyCanvas"></canvas>
            <canvas id="sparkleCanvas"></canvas>

            <div class="soft-filter"></div>
            <div class="hand-glow"></div>

            <div id="heartLayer"></div>
            <div id="birdLayer"></div>
        </div>
    </div>
</section>

<script src="sky.js"></script>
<script src="heart.js"></script>
<script src="bird.js"></script>
<script src="script.js"></script>
</body>
</html>
